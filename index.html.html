<!DOCTYPE html>
<html>
<head>
    <title>Client-Server Demo</title>
</head>
<body>
    <h1>Frontend (Client)</h1>
    <button id="checkBtn">Check Backend Status</button>
    <p id="status"></p>

    <script>
        document.getElementById('checkBtn').addEventListener('click', () => {
            // This is the CLIENT making a request to the BACKEND
            fetch('http://localhost:5000')
                .then(response => response.text())
                .then(data => {
                    document.getElementById('status').innerText = data;
                })
                .catch(err => {
                    document.getElementById('status').innerText = "Backend is offline!";
                });
        });
    </script>
</body>
</html>
